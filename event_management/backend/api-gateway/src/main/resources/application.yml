server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8082
          predicates:
            - Path=/auth/**

        - id: event-service
          uri: http://localhost:8081
          predicates:
            - Path=/events/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS   # 🔥 MUST ADD THIS
            allowedHeaders: "*"
            allowCredentials: true